# 目录设置
menu:
  Home: / || fas fa-home
  Archives: /archives/ || fas fa-archive
  Tags: /tags/ || fas fa-tags
  Categories: /categories/ || fas fa-folder-open
  List||fas fa-list:
    Music: /music/ || fas fa-music
    Movie: /movies/ || fas fa-video
  Link: /link/ || fas fa-link
  About: /about/ || fas fa-heart

  # 全局设置
  darkmode:
  enable: true
  button: true # 显示切换按钮
highlight:
  enable: true
  copy: true # 开启一键复制
  highlight_copy: true

# 首页设置
# 首页顶部的巨幕图
index_img: https://chenzyishere.oss-cn-guangzhou.aliyuncs.com/img_for_typora/000027.jpg
index_layout: 3

# Display the article introduction on homepage
# 1: description
# 2: both (if the description exists, it will show description, or show the auto_excerpt)
# 3: auto_excerpt (default)
# false: do not show the article introduction
index_post_content:
  method: 2
  # If you set method to 2 or 3, the length need to config
  length: 500

subtitle:
  enable: true
  # Typewriter Effect (打字效果)
  effect: true
  # Customize typed.js
  # https://github.com/mattboldt/typed.js/#customization
  typed_option:
  # source 調用第三方服務
  # false 關閉調用
  # 1  調用一言網的一句話（簡體） https://hitokoto.cn/
  # 2  調用一句網（簡體） http://yijuzhan.com/
  # 3  調用今日詩詞（簡體） https://www.jinrishici.com/
  # subtitle 會先顯示 source , 再顯示 sub 的內容
  source: false
  # 如果關閉打字效果，subtitle 只會顯示 sub 的第一行文字
  sub:
    - 量化学习驱散认知迷雾

# 全局背景图
background: https://i.loli.net/2019/09/09/5oDRkWVKctx2b6A.png
# 侧边栏头像
avatar:
  img: https://chenzyishere.oss-cn-guangzhou.aliyuncs.com/img_for_typora/%E5%BE%AE%E4%BF%A1%E5%9B%BE%E7%89%87_20230212223354.jpg
  effect: false # 头像旋转效果

### 代码块设置
code_blocks:
  # Code block theme: darker / pale night / light / ocean / false
  theme: darker
  macStyle: true
  # Code block height limit (unit: px)
  height_limit: false
  word_wrap: true

  # Toolbar
  copy: true
  language: true
  # true: shrink the code blocks | false: expand the code blocks | none: expand code blocks and hide the button
  shrink: false
  fullpage: true

### 文章页设置
toc:
  post: true
  page: true
  number: true
  expand: true
  # Only for post
  style_simple: true
  scroll_percent: true

post_copyright:
  # 是否啟用版權聲明
  enable: true
  # 是否進行文章 URL 解碼
  decode: false
  # 作者鏈接
  author_href:
  # 許可證類型
  license: CC BY-NC-SA 4.0
  # 許可證鏈接
  license_url: https://creativecommons.org/licenses/by-nc-sa/4.0/

# 打赏页
reward:
  enable: false
  text:
  QR_code:
    - img: /img/wechat.jpg
      link:
      text: 微信
    - img: /img/alipay.jpg
      link:
      text: 支付寶

# 文章分页按钮
# post_pagination (分頁)
# value: 1 || 2 || false
# 1: The 'next post' will link to old post
# 2: The 'next post' will link to new post
# false: disable pagination
post_pagination: 1

# anchor
anchor:
  # when you scroll, the URL will update according to header id.
  auto_update: true
  # Click the headline to scroll and update the anchor
  click_to_scroll: true

footer:
  owner:
    enable: true
    since: 2025
  custom_text: Hi, welcome to my <a href="https://butterfly.js.org/">blog</a>!


# Need to install the hexo-wordcount plugin
wordcount:
  enable: true
  # Display the word count of the article in post meta
  post_wordcount: true
  # Display the time to read the article in post meta
  min2read: true
  # Display the total word count of the website in aside's webinfo
  total_wordcount: true

  # A simple 404 page
error_404:
  enable: true
  subtitle: '页面没有找到'
  background:
