# 目录设置
menu:
  首页: / || fas fa-home
  项目: /projects/ || fas fa-folder-open
  归档: /archives/ || fas fa-archive
  知识索引: /taxonomy/ || fas fa-layer-group
  清单||fas fa-list:
    音乐: /music/ || fas fa-music
    电影: /movies/ || fas fa-video
  友链: /link/ || fas fa-link
  关于: /about/ || fas fa-heart

# 全局设置 (确保顶格)
darkmode:
  enable: true
  button: true
highlight:
  enable: true
  copy: true
  highlight_copy: true

# 首页设置
index_img: https://chenzyishere.oss-cn-guangzhou.aliyuncs.com/img_for_typora/000027.jpg
index_layout: 3
index_post_content:
  method: 2
  length: 500

subtitle:
  enable: true
  effect: true
  source: false
  sub:
    - 量化学习驱散认知迷雾

# 全局背景图
background: "linear-gradient(135deg, #0b1020 0%, #0f1b36 45%, #12324a 100%)"

# 侧边栏头像
avatar:
  img: https://chenzyishere.oss-cn-guangzhou.aliyuncs.com/img_for_typora/%E5%BE%AE%E4%BF%A1%E5%9B%BE%E7%89%87_20230212223354.jpg
  effect: false

### 代码块设置
code_blocks:
  theme: darker
  macStyle: true
  height_limit: false
  word_wrap: true
  copy: true
  language: true
  shrink: false
  fullpage: true

### 文章页设置
toc:
  post: true
  page: true
  number: true
  expand: true
  style_simple: true
  scroll_percent: true

post_copyright:
  enable: true
  decode: false
  author_href: /  # 优化：不要留空，填个斜杠
  license: CC BY-NC-SA 4.0
  license_url: https://creativecommons.org/licenses/by-nc-sa/4.0/

# 打赏页 (优化：如果不启用，保持 false 即可)
reward:
  enable: false

# 文章分页按钮
post_pagination: 1

# 锚点设置
anchor:
  auto_update: true
  click_to_scroll: true

footer:
  owner:
    enable: true
    since: 2025
  custom_text: 'Hi, welcome to my <a href="https://butterfly.js.org/">blog</a>!'

# 字数统计 (确保已安装 hexo-wordcount)
wordcount:
  enable: true
  post_wordcount: true
  min2read: true
  total_wordcount: true

# 搜索（知识库检索入口）
search:
  use: local_search
  local_search:
    preload: true
    top_n_per_article: 2
    unescape: false
    pagination:
      enable: true
      hitsPerPage: 8

# Theme color customization
theme_color:
  enable: true
  main: "#58A6FF"
  paginator: "#2DD4BF"
  button_hover: "#38BDF8"
  text_selection: "#2DD4BF"
  link_color: "#7DD3FC"
  meta_color: "#9AA4B2"
  hr_color: "#2A4365"
  code_foreground: "#F59E0B"
  code_background: "rgba(88, 166, 255, 0.12)"
  toc_color: "#2DD4BF"
  blockquote_padding_color: "#58A6FF"
  blockquote_background_color: "#58A6FF"
  scrollbar_color: "#58A6FF"
  meta_theme_color_light: "#0f172a"
  meta_theme_color_dark: "#020617"

mask:
  header: false
  footer: false

display_mode: dark



