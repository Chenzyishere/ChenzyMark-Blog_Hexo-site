name: Sync Content and Deploy

on:
  repository_dispatch:
    types: [content-updated]
  push:
    branches: ["main"]
    paths:
      - "source/**"
      - "themes/**"
      - "_config.yml"
      - "_config.butterfly.yml"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/sync-content-and-deploy.yml"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  sync-build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout blog repo (main)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Checkout content repo
        if: github.event_name == 'repository_dispatch'
        uses: actions/checkout@v4
        with:
          repository: Chenzyishere/chenzymark-documents
          ref: main
          path: _content_repo
          token: ${{ secrets.DOCS_REPO_PAT }}

      - name: Sync source/_posts from content repo
        if: github.event_name == 'repository_dispatch'
        run: rsync -av --delete _content_repo/source/_posts/ source/_posts/

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Clean and build site
        run: |
          npm run clean
          npm run build

      - name: Commit synced posts/public to main
        if: github.event_name == 'repository_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add source/_posts public
          git diff --cached --quiet || git commit -m "chore(content): sync posts from documents repo"
          git push origin main

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
