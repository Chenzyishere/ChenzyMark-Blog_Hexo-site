name: Sync Content and deploy

on:
  repository_dispatch:
    types: [content-updated]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-to-main:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout blog repo (main)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Checkout content repo
        uses: actions/checkout@v4
        with:
          repository: ChenzyMarkkk/chenzymark-documents
          path: _content_repo
          token: ${{ secrets.DOCS_REPO_PAT }}

      - name: Sync source/ from content repo
        run: rsync -av --delete _content_repo/source/ source/

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Clean and build site
        run: |
          npm run clean
          npm run build

      - name: Commit and push to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add source public
          git diff --cached --quiet || git commit -m "chore(content): sync from documents repo"
          git push origin main
