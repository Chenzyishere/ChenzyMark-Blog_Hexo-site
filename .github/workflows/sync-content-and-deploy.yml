name: Sync Content And Deploy

on:
  repository_dispatch:
    types: [content-updated]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout blog repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout content repo
        uses: actions/checkout@v4
        with:
          repository: Chenzyishere/chenzymark-documents
          path: _content_repo
          token: ${{ secrets.DOCS_REPO_PAT }}

      - name: Sync source/ from content repo
        run: |
          rsync -av --delete _content_repo/source/ source/

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
